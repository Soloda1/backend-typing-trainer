basePath: /
definitions:
  auth.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
        type: string
    type: object
  auth.loginRequest:
    properties:
      login:
        example: player_one
        type: string
      password:
        example: secret
        type: string
    required:
    - login
    - password
    type: object
  auth.registerRequest:
    properties:
      login:
        example: player_one
        type: string
      password:
        example: secret
        type: string
    required:
    - login
    - password
    type: object
  auth.registerResponse:
    properties:
      user:
        $ref: '#/definitions/auth.registerUserResponse'
    type: object
  auth.registerUserResponse:
    properties:
      createdAt:
        example: "2026-03-22T21:00:00Z"
        type: string
      id:
        example: 22222222-2222-2222-2222-222222222222
        type: string
      login:
        example: player_one
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        example: user
    type: object
  difficultylevels.difficultyLevelListResponse:
    properties:
      difficulty_levels:
        items:
          $ref: '#/definitions/difficultylevels.difficultyLevelResponse'
        type: array
    type: object
  difficultylevels.difficultyLevelResponse:
    properties:
      allowed_mistakes:
        type: integer
      id:
        type: string
      key_press_time:
        type: number
      keyboard_zone_ids:
        items:
          type: string
        type: array
      max_exercise_length:
        type: integer
      min_exercise_length:
        type: integer
    type: object
  difficultylevels.difficultyLevelSingleResponse:
    properties:
      difficulty_level:
        $ref: '#/definitions/difficultylevels.difficultyLevelResponse'
    type: object
  difficultylevels.upsertDifficultyLevelRequest:
    properties:
      allowed_mistakes:
        minimum: 0
        type: integer
      key_press_time:
        type: number
      keyboard_zone_ids:
        items:
          type: string
        minItems: 1
        type: array
      max_exercise_length:
        type: integer
      min_exercise_length:
        type: integer
    required:
    - keyboard_zone_ids
    type: object
  exercises.exerciseListResponse:
    properties:
      exercises:
        items:
          $ref: '#/definitions/exercises.exerciseResponse'
        type: array
    type: object
  exercises.exerciseResponse:
    properties:
      id:
        type: string
      level_id:
        type: string
      text:
        type: string
    type: object
  exercises.exerciseSingleResponse:
    properties:
      exercise:
        $ref: '#/definitions/exercises.exerciseResponse'
    type: object
  exercises.upsertExerciseRequest:
    properties:
      level_id:
        type: string
      text:
        type: string
    required:
    - level_id
    - text
    type: object
  keyboardzones.keyboardZoneListResponse:
    properties:
      keyboard_zones:
        items:
          $ref: '#/definitions/keyboardzones.keyboardZoneResponse'
        type: array
    type: object
  keyboardzones.keyboardZoneResponse:
    properties:
      id:
        type: string
      name:
        type: string
      symbols:
        type: string
    type: object
  keyboardzones.keyboardZoneSingleResponse:
    properties:
      keyboard_zone:
        $ref: '#/definitions/keyboardzones.keyboardZoneResponse'
    type: object
  models.UserRole:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - UserRoleAdmin
    - UserRoleUser
  statistics.createStatisticRequest:
    properties:
      execution_time:
        type: number
      exercise_id:
        type: string
      level_id:
        type: string
      mistakes_percent:
        minimum: 0
        type: number
      speed:
        type: number
      user_id:
        type: string
    required:
    - exercise_id
    - level_id
    - user_id
    type: object
  statistics.statisticListResponse:
    properties:
      statistics:
        items:
          $ref: '#/definitions/statistics.statisticResponse'
        type: array
    type: object
  statistics.statisticResponse:
    properties:
      created_at:
        type: string
      execution_time:
        type: number
      exercise_id:
        type: string
      id:
        type: string
      level_id:
        type: string
      mistakes_percent:
        type: number
      speed:
        type: number
      user_id:
        type: string
    type: object
  statistics.statisticSingleResponse:
    properties:
      statistic:
        $ref: '#/definitions/statistics.statisticResponse'
    type: object
  utils.ErrorCode:
    enum:
    - INVALID_REQUEST
    - UNAUTHORIZED
    - NOT_FOUND
    - FORBIDDEN
    - CONFLICT
    - LOGIN_EXISTS
    - INTERNAL_ERROR
    type: string
    x-enum-varnames:
    - ErrorCodeInvalidRequest
    - ErrorCodeUnauthorized
    - ErrorCodeNotFound
    - ErrorCodeForbidden
    - ErrorCodeConflict
    - ErrorCodeLoginExists
    - ErrorCodeInternalError
  utils.ErrorDetails:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/utils.ErrorCode'
        example: INVALID_REQUEST
      message:
        example: invalid request
        type: string
    type: object
  utils.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/utils.ErrorDetails'
    type: object
  utils.InternalErrorDetails:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/utils.ErrorCode'
        example: INTERNAL_ERROR
      message:
        example: internal server error
        type: string
    type: object
  utils.InternalErrorResponse:
    properties:
      error:
        $ref: '#/definitions/utils.InternalErrorDetails'
    type: object
